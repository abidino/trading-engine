# ─────────────────────────────────────────────────────────────────────────────
# "mock" profile — runs the full app with NO external dependencies.
#   * In-memory H2 database (no PostgreSQL needed)
#   * All external providers (Yahoo, NewsAPI, Finviz, Reddit, LLM, SMTP) are
#     replaced by deterministic stub adapters (@Profile("mock")).
# Run with:  mvn spring-boot:run -Dspring-boot.run.profiles=mock
# ─────────────────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: "jdbc:h2:mem:tradingagents;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE;INIT=CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
  # Dummy SMTP so mail auto-config starts; delivery itself is stubbed.
  mail:
    host: localhost
    port: 2525
    username: mock
    password: mock
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    com.trading: INFO

# Mail is stubbed in mock mode; skip its health probe so /actuator/health is UP.
management:
  health:
    mail:
      enabled: false
